<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>STS: Bildfahrplan Manu-Live</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 20px; background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        
        /* Das Haupt-Layout erzwingt, dass beide Spalten die gleiche Höhe einnehmen */
        .main-layout { 
            display: flex; 
            gap: 20px; 
            max-width: 1600px; 
            margin: 0 auto; 
            align-items: stretch; /* WICHTIG: Dehnt alle Kind-Elemente auf die exakt gleiche Höhe */
        }
        
        /* Die linke Spalte wächst flexibel und bildet die Basis für die Gesamthöhe */
        .left-content { 
            flex: 1; 
            min-width: 0; 
            display: flex;
            flex-direction: column;
        }
        
        /* Das linke Panel dehnt sich ebenfalls aus, falls nötig */
        .panel { 
            background: #1e293b; 
            border: 1px solid #334155; 
            padding: 20px; 
            border-radius: 8px; 
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        
        h1 { color: #f1f5f9; font-size: 24px; margin: 0; }
        label { color: #94a3b8; font-size: 14px; }
        select, input[type="time"], button, form { 
            background: #334155; 
            color: #fff; 
            border: 1px solid #475569; 
            padding: 7px 10px; 
            border-radius: 4px; 
            font-size: 14px;
        }
        button, form { cursor: pointer; background: #475569; font-weight: bold; }

        .button-a a {
            color: #ffffff;
            text-decoration: none;
            background: #eb0000;
            padding: 6px 15px;
            border-radius: 6px;
            margin-left: 5px;
            transition: background 0.2s ease;
        }

        button:hover, form:hover { background: #64748b; }
        canvas { background: #1e293b; border: 1px solid #475569; border-radius: 4px; display: block; }
        
        .hidden {
            display: none !important;
        }

        .segment-info {
            font-size: 12px;
            color: #94a3b8;
            margin-left: 10px;
            padding: 6px 12px;
            background: #0f172a;
            border-radius: 4px;
            border-left: 3px solid #0ea5e9;
        }
    </style>
</head>
<body>

<div class="main-layout">
    
    <div class="left-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Bildfahrplan manuelle Betriebslenkung</h1>
			<div class="button-a"><a href="./blm">Zum&nbsp;Betriebslagemonitor</a></div>
            <div style="font-size: 14px; color: #94a3b8;">
                Status: <span style="color: #10b981; font-weight: bold;">● LIVE</span> (Zuschauermodus)
            </div>
        </div>

        <div class="panel">
            <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 15px;">
                <label>
                    Strecke suchen:
                    <input type="text" id="route_filter" placeholder="Z.B. Mil..." onkeyup="filterRoutes()" style="width: 150px;">
                </label>
                <label>
                    Strecke:
                    <select id="route_select" onchange="onRouteChanged()">
                    </select>
                </label>
                
                <!-- Segment-Picker -->
                <label>
                    Von Station:
                    <select id="segment_from" onchange="loadAndRenderGraph()" style="width: 120px;">
                        <option value="">--- Alle ---</option>
                    </select>
                </label>
                <label>
                    Bis Station:
                    <select id="segment_to" onchange="loadAndRenderGraph()" style="width: 120px;">
                        <option value="">--- Alle ---</option>
                    </select>
                </label>
                <div id="segment_status" class="segment-info" style="display: none;"></div>
                
                <label>
                    Modus:
                    <select id="time_mode" onchange="updateTimeMode()">
                        <option value="auto" selected>Auto-Scroll</option>
                        <option value="fixed">Fixes Fenster</option>
                    </select>
                </label>

                <label>
                    Zeitbasis:
                    <select id="time_basis" onchange="updateTimeMode(); updateInstanzTimeLabels();">
                        <option value="instanz1" selected>STS Instanz 1</option>
                        <option value="instanz2">STS Instanz 2</option>
                        <option value="manual">Eigenes Offset / Zeit</option>
                    </select>
                </label>

                <label id="offset_container" style="display: none;">
                    STS-Offset (Min):
                    <input type="number" id="sts_offset" value="180" min="-600" max="600" style="width: 60px;" onchange="applyAutoScroll()">
                </label>

                <div id="fixed_time_container" style="display: none; gap: 10px; align-items: center;">
                    <label>
                        Von:
                        <input type="time" id="graph_start" value="11:45" onchange="loadAndRenderGraph()">
                    </label>
                    <label>
                        Bis:
                        <input type="time" id="graph_end" value="16:00" onchange="loadAndRenderGraph()">
                    </label>
                </div>

                <button onclick="loadAndRenderGraph()">Aktualisieren</button>
                <button type="button" id="toggle_ticker_btn" onclick="toggleTicker()" style="background: #10b981;">Ticker einblenden</button>

            </div>
            
            <div style="width: 100%; flex: 1;">
                <canvas id="graphCanvas" width="800" height="500" style="margin-top: 0; width: 100%; height: auto; display: block;"></canvas>
            </div>
            
            <input type="time" id="graph_start" value="11:45" style="display: none;">
            <input type="time" id="graph_end" value="16:00" style="display: none;">
        </div>
    </div>
    
	<div id="ticker_panel" class="hidden" style="flex: 0 0 300px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; margin-top: 44px; max-height: 850px; overflow: hidden;">
        <h2 style="color: #f1f5f9; font-size: 16px; margin: 0 0 15px 0; border-bottom: 1px solid #334155; padding-bottom: 10px;">Letzte Änderungen</h2>
        <ul id="ticker_list" style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; font-size: 13px; overflow-y: auto; flex: 1;">
        </ul>
    </div>
</div>

<div id="editor_panel" style="display: none;">
    <div id="timetable_body"></div> </div>
<form id="timetable_form" style="display: none;"></form>
<select id="route_filter" style="display: none;"></select>

<script>
var ROUTES = {};          
var routesConfig = {};    
var activeTrains = [];    
var autoScrollInterval = null;
var currentSegmentFrom = '';
var currentSegmentTo = '';

// Hilfsfunktion zur Manipulation der URL-Parameter ohne Neuladen
function updateUrlParameter(key, value) {
    const url = new window.URL(window.location.href);
    if (value) {
        url.searchParams.set(key, value);
    } else {
        url.searchParams.delete(key);
    }
    window.history.replaceState({}, '', url.toString());
}

// Segment-Picker aktualisieren, wenn Route wechselt
function onRouteChanged() {
    const routeSelect = document.getElementById('route_select');
    const route = routesConfig[routeSelect.value];
    
    const segmentFromSelect = document.getElementById('segment_from');
    const segmentToSelect = document.getElementById('segment_to');
    
    // Optionen neufüllen
    segmentFromSelect.innerHTML = '<option value="">--- Alle ---</option>';
    segmentToSelect.innerHTML = '<option value="">--- Alle ---</option>';
    
    if (route && route.stations) {
        route.stations.forEach(station => {
            const optFrom = document.createElement('option');
            optFrom.value = station.id;
            optFrom.textContent = `${station.abbr} (${station.km} km)`;
            segmentFromSelect.appendChild(optFrom);
            
            const optTo = document.createElement('option');
            optTo.value = station.id;
            optTo.textContent = `${station.abbr} (${station.km} km)`;
            segmentToSelect.appendChild(optTo);
        });
    }
    
    // Segment-Status zurücksetzen
    currentSegmentFrom = '';
    currentSegmentTo = '';
    updateSegmentStatus();
    
    loadAndRenderGraph();
}

// Segment-Status anzeigen/verstecken
function updateSegmentStatus() {
    const statusDiv = document.getElementById('segment_status');
    const routeSelect = document.getElementById('route_select');
    const route = routesConfig[routeSelect.value];
    
    if (!currentSegmentFrom && !currentSegmentTo) {
        statusDiv.style.display = 'none';
        return;
    }
    
    let fromName = 'Start';
    let toName = 'End';
    
    if (currentSegmentFrom && route) {
        const st = route.stations.find(s => s.id === currentSegmentFrom);
        if (st) fromName = st.abbr;
    }
    
    if (currentSegmentTo && route) {
        const st = route.stations.find(s => s.id === currentSegmentTo);
        if (st) toName = st.abbr;
    }
    
    statusDiv.style.display = 'block';
    statusDiv.textContent = `Segment: ${fromName} → ${toName}`;
}

function updateInstanzTimeLabels() {
    const timeBasisSelect = document.getElementById('time_basis');
    if (!timeBasisSelect) return;
    
    const format = (min) => `${String(Math.floor(min / 60)).padStart(2, '0')}:${String(min % 60).padStart(2, '0')}`;
    const options = timeBasisSelect.options;
    
    for (let i = 0; i < options.length; i++) {
        const val = options[i].value;
        if (val === 'instanz1' || val === 'instanz2') {
            const stsMin = getDynamicSTSTime(val);
            const labelNum = val === 'instanz1' ? '1' : '2';
            options[i].textContent = `STS Instanz ${labelNum} (${format(stsMin)})`;
        }
    }
}

function updateTimeMode() {
    const mode = document.getElementById('time_mode').value;
    const basis = document.getElementById('time_basis').value;
    
    const offsetContainer = document.getElementById('offset_container');
    const fixedTimeContainer = document.getElementById('fixed_time_container');
    
    // Sichtbarkeiten regeln
    if (mode === 'auto') {
        // Offset-Feld nur bei manueller Auswahl im Auto-Modus einblenden
        offsetContainer.style.display = (basis === 'manual') ? "" : "none";
        fixedTimeContainer.style.display = "none";
        
        applyAutoScroll();
        if (autoScrollInterval) clearInterval(autoScrollInterval);
        autoScrollInterval = setInterval(applyAutoScroll, 10000);
    } else {
        // Fixes Fenster
        offsetContainer.style.display = "none";
        // Zeitbalken-Eingabe nur bei manueller Auswahl erlauben
        fixedTimeContainer.style.display = (basis === 'manual') ? "flex" : "none";
        
        if (autoScrollInterval) clearInterval(autoScrollInterval);
        autoScrollInterval = null;
        
        // Wenn Instanz 1 oder 2 im fixen Modus gewählt sind, berechnen wir die feste aktuelle Zeit
        if (basis !== 'manual') {
            applyAutoScroll();
        } else {
            loadAndRenderGraph();
        }
    }
}

// Beibehalten für die Initialisierung
function updateAutoScroll() {
    updateTimeMode();
}

function applyAutoScroll() {
    const mode = document.getElementById('time_mode').value;
    const basis = document.getElementById('time_basis').value;
    
    let adjustedStsMinutes = 0;

    if (basis === 'manual') {
        const now = new Date();
        const pcMinutes = now.getHours() * 60 + now.getMinutes();
        const offsetInput = document.getElementById('sts_offset');
        const offset = offsetInput ? parseInt(offsetInput.value || 0, 10) : 0;
        adjustedStsMinutes = ((pcMinutes + offset) % 1440 + 1440) % 1440;
    } else {
        // Nutzt die dynamische 16h-Berechnung für Instanz 1 oder 2
        adjustedStsMinutes = getDynamicSTSTime(basis);
    }
    
    const startMinutes = ((adjustedStsMinutes - 15 + 1440) % 1440);
    const endMinutes = ((adjustedStsMinutes + 60 + 1440) % 1440);
    
    const startTime = `${String(Math.floor(startMinutes / 60)).padStart(2, '0')}:${String(startMinutes % 60).padStart(2, '0')}`;
    const endTime = `${String(Math.floor(endMinutes / 60)).padStart(2, '0')}:${String(endMinutes % 60).padStart(2, '0')}`;
    
    if (mode === 'auto' || basis !== 'manual') {
        document.getElementById('graph_start').value = startTime;
        document.getElementById('graph_end').value = endTime;
    }
    
    if (typeof loadAndRenderGraph === 'function') {
        loadAndRenderGraph();
    }
}
</script>

<script src="app.js"></script>

<script>
async function initZuschauer() {
    const formData = new FormData();
    formData.append('action', 'get_routes');
    
    try {
        const res = await fetch('timetable.php', { method: 'POST', body: formData });
        const routesData = await res.json();
        
        ROUTES = routesData;
        routesConfig = routesData;
        
        const selector = document.getElementById('route_select');
        selector.innerHTML = '';
        
        // --- URL-Parameter auslesen ---
        const urlParams = new URLSearchParams(window.location.search);
        const paramRoute = urlParams.get('route')?.toLowerCase(); // Sucht nach ?route=...
        const paramTicker = urlParams.get('ticker')?.toLowerCase(); // Sucht nach ?ticker=...
        const paramSegmentFrom = urlParams.get('segment_from'); // Segment Start
        const paramSegmentTo = urlParams.get('segment_to'); // Segment End
        
        // Ticker-Sichtbarkeit über URL initialisieren
        const ticker = document.getElementById('ticker_panel');
        const tickerBtn = document.getElementById('toggle_ticker_btn');
        if (ticker && tickerBtn && paramTicker === 'visible') {
            ticker.classList.remove('hidden');
            tickerBtn.innerText = 'Ticker ausblenden';
            tickerBtn.style.background = '#334155';
        }
        
        let firstId = null;
        let matchedId = null;
        let exactMatchFound = false; // Verhindert das Überschreiben durch Teilwörter oder Gegenrichtungen

        for (const [id, route] of Object.entries(routesConfig)) {
            if (!firstId) firstId = id;
            
            // Logik für die Routen-Ermittlung über die URL
            if (paramRoute && !exactMatchFound) {
                // 1. Priorität: Exakter Treffer bei der ID oder beim vollständigen Namen
                if (id.toLowerCase() === paramRoute || route.name.toLowerCase() === paramRoute) {
                    matchedId = id;
                    exactMatchFound = true; // Suchergebnis einfrieren
                } 
                // 2. Priorität: Teilstring im Namen (nur nutzen, solange kein exakter Match existiert)
                else if (route.name.toLowerCase().includes(paramRoute)) {
                    matchedId = id;
                }
            }

            const opt = document.createElement('option');
            opt.value = id;
            // ID wird hinten angehängt
            opt.innerText = `${route.name} [${id}]`;
            
            const searchTerms = [];
            if (route.stations && Array.isArray(route.stations)) {
                route.stations.forEach(st => {
                    searchTerms.push(st.name);
                    searchTerms.push(st.abbr);
                });
            }
            opt.setAttribute('data-search', searchTerms.join(' '));
            
            selector.appendChild(opt);
        }
        
        // Wenn ein Treffer über die URL erzielt wurde, nimm diesen, sonst die erste Route
        if (matchedId) {
            currentRouteId = matchedId;
            selector.value = matchedId;
        } else if (firstId) {
            currentRouteId = firstId; 
            selector.value = firstId;
            // Wenn kein Parameter übergeben wurde, setzen wir die Standard-ID in die URL
            updateUrlParameter('route', firstId);
        }
        
        // Route initialisieren (befüllt Segment-Picker)
        if (typeof onRouteChanged === 'function') {
            onRouteChanged();
        }
        
        // Segment-Werte aus URL setzen, wenn vorhanden
        if (paramSegmentFrom) {
            document.getElementById('segment_from').value = paramSegmentFrom;
            currentSegmentFrom = paramSegmentFrom;
        }
        if (paramSegmentTo) {
            document.getElementById('segment_to').value = paramSegmentTo;
            currentSegmentTo = paramSegmentTo;
        }
        updateSegmentStatus();
        
        // Daten holen und zeichnen
        await loadAndRenderGraph();
        await loadAndRenderTicker();
        
        // Starte Auto-Scroll NACH dem ersten Render
        updateAutoScroll();
        updateInstanzTimeLabels();
        
        // Auto-Refresh alle 30 Sekunden
        setInterval(() => {
            loadAndRenderGraph();
            loadAndRenderTicker();
        }, 30000);
        
        // Update Instanz-Zeit-Labels alle 10 Sekunden
        setInterval(() => {
            updateInstanzTimeLabels();
        }, 10000);

    } catch (e) {
        console.error("Fehler beim Initialisieren der Zuschaueransicht:", e);
    }
}

async function loadAndRenderGraph() {
    const routeSelect = document.getElementById('route_select');
    if (!routeSelect || !routeSelect.value) return;
    
    currentRouteId = routeSelect.value; 
    
    // Segment-Werte auslesen
    currentSegmentFrom = document.getElementById('segment_from').value;
    currentSegmentTo = document.getElementById('segment_to').value;
    updateSegmentStatus();
    
    // URL-Parameter synchronisieren
    updateUrlParameter('route', currentRouteId);
    if (currentSegmentFrom) updateUrlParameter('segment_from', currentSegmentFrom);
    else updateUrlParameter('segment_from', null);
    if (currentSegmentTo) updateUrlParameter('segment_to', currentSegmentTo);
    else updateUrlParameter('segment_to', null);
    
    const formData = new FormData();
    formData.append('action', 'get_all_data');
    formData.append('route_id', currentRouteId);

    try {
        const res = await fetch('timetable.php', { method: 'POST', body: formData });
        const trainsData = await res.json();
        
        // Wenn Segment aktiv: trainDaten filtern
        if (currentSegmentFrom || currentSegmentTo) {
            trainsData.forEach(train => {
                train.stops = filterTrainStops(train.stops);
            });
        }
        
        activeTrains = trainsData;
        
        if (typeof renderGraph === 'function') {
            renderGraph();
        }
    } catch (e) {
        console.error("Fehler beim Laden der Fahrplandaten für Zuschauer:", e);
    }
}

function filterTrainStops(stops) {
    const route = routesConfig[currentRouteId];
    if (!route || !route.stations) return stops;
    
    let fromIndex = 0;
    let toIndex = route.stations.length - 1;
    
    if (currentSegmentFrom) {
        const fromSt = route.stations.findIndex(s => s.id === currentSegmentFrom);
        if (fromSt !== -1) fromIndex = fromSt;
    }
    
    if (currentSegmentTo) {
        const toSt = route.stations.findIndex(s => s.id === currentSegmentTo);
        if (toSt !== -1) toIndex = toSt;
    }
    
    // Stationen im Bereich [fromIndex, toIndex] herausfiltern
    const validStationIds = new Set();
    for (let i = fromIndex; i <= toIndex && i < route.stations.length; i++) {
        validStationIds.add(route.stations[i].id);
    }
    
    return stops.filter(stop => validStationIds.has(stop.station_id));
}

async function loadAndRenderTicker() {
    const formData = new FormData();
    formData.append('action', 'get_audit_log');

    try {
        const res = await fetch('timetable.php', { method: 'POST', body: formData });
        const logs = await res.json();
        
        const list = document.getElementById('ticker_list');
        if (!list) return;
        
        list.innerHTML = '';
        
        if (!logs || logs.length === 0) {
            list.innerHTML = '<li style="color: #64748b; font-style: italic;">Noch keine Änderungen erfasst.</li>';
            return;
        }

        logs.forEach(log => {
            const li = document.createElement('li');
            li.style.padding = '8px 10px';
            li.style.background = '#0f172a';
            li.style.border = '1px solid #334155';
            li.style.borderRadius = '4px';
            li.style.lineHeight = '1.4';
            
            const logZeit = log.zeit ?? log.timestamp ?? 'Unbekannt';
            
            li.innerHTML = `
                <span style="color: #64748b; font-weight: bold; font-family: monospace;">[${logZeit}]</span> 
                Zug <strong style="color: #38bdf8;">${log.train_number}</strong> <br>
                <span style="color: #94a3b8;">Disponent:</span> <span style="color: #f1f5f9;">${log.username}</span>
            `;
            list.appendChild(li);
        });
    } catch (e) {
        console.error("Fehler beim Laden des Tickers:", e);
    }
}

function switchRouteAndLoad() {
    const routeSelect = document.getElementById('route_select');
    if (routeSelect) {
        currentRouteId = routeSelect.value;
        updateUrlParameter('route', currentRouteId);
    }
    if (typeof onRouteChanged === 'function') {
        onRouteChanged();
    }
    loadAndRenderGraph();
}

const originalFetch = window.fetch;
window.fetch = function(url, options) {
    if (url === '') url = 'timetable.php';
    return originalFetch(url, options);
};

window.onload = initZuschauer;

function filterRoutes() {
    const filterValue = document.getElementById('route_filter').value.toLowerCase();
    const select = document.getElementById('route_select');
    const options = select.options;
    
    let firstVisibleOption = null;

    for (let i = 0; i < options.length; i++) {
        const option = options[i];
        const routeName = option.text.toLowerCase();
        const stationTerms = option.getAttribute('data-search') ? option.getAttribute('data-search').toLowerCase() : '';
        
        if (routeName.includes(filterValue) || stationTerms.includes(filterValue)) {
            option.style.display = "";
            if (!firstVisibleOption) {
                firstVisibleOption = option;
            }
        } else {
            option.style.display = "none";
        }
    }

    if (firstVisibleOption && select.value !== firstVisibleOption.value) {
        select.value = firstVisibleOption.value;
        onRouteChanged();
    }
}

function toggleTicker() {
    const ticker = document.getElementById('ticker_panel');
    const button = document.getElementById('toggle_ticker_btn');
    
    if (!ticker || !button) return;
    
    if (ticker.classList.contains('hidden')) {
        ticker.classList.remove('hidden');
        button.innerText = 'Ticker ausblenden';
        button.style.background = '#334155';
        updateUrlParameter('ticker', 'visible');
    } else {
        ticker.classList.add('hidden');
        button.innerText = 'Ticker einblenden';
        button.style.background = '#10b981';
        updateUrlParameter('ticker', null);
    }
    
    if (typeof loadAndRenderGraph === 'function') {
        loadAndRenderGraph();
    }
}
</script>
</body>
</html>
