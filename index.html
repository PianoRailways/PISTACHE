<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>STS: Bildfahrplan Manu-Live</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 20px; background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        
        /* Das Haupt-Layout erzwingt, dass beide Spalten die gleiche Höhe einnehmen */
        .main-layout { 
            display: flex; 
            gap: 20px; 
            max-width: 1600px; 
            margin: 0 auto; 
            align-items: stretch; /* WICHTIG: Dehnt alle Kind-Elemente auf die exakt gleiche Höhe */
        }
        
        /* Die linke Spalte wächst flexibel und bildet die Basis für die Gesamthöhe */
        .left-content { 
            flex: 1; 
            min-width: 0; 
            display: flex;
            flex-direction: column;
        }
        
        /* Das linke Panel dehnt sich ebenfalls aus, falls nötig */
        .panel { 
            background: #1e293b; 
            border: 1px solid #334155; 
            padding: 20px; 
            border-radius: 8px; 
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        
        h1 { color: #f1f5f9; font-size: 24px; margin: 0; }
        label { color: #94a3b8; font-size: 14px; }
        select, input[type="time"], button { 
            background: #334155; 
            color: #fff; 
            border: 1px solid #475569; 
            padding: 8px 12px; 
            border-radius: 4px; 
            font-size: 14px;
        }
        button { cursor: pointer; background: #475569; font-weight: bold; }
        button:hover { background: #64748b; }
        canvas { background: #1e293b; border: 1px solid #475569; border-radius: 4px; display: block; }
		
		.hidden {
			display: none !important;
			}
    </style>
</head>
<body>

<div class="main-layout">
    
    <div class="left-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Bildfahrplan manuelle Betriebslenkung</h1>
            <div style="font-size: 14px; color: #94a3b8;">
                Status: <span style="color: #10b981; font-weight: bold;">● LIVE</span> (Zuschauermodus)
            </div>
        </div>

        <div class="panel">
            <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 15px;">
                <label>
                    Strecke suchen:
                    <input type="text" id="route_filter" placeholder="Z.B. Mil..." onkeyup="filterRoutes()" style="width: 150px;">
                </label>
                <label>
                    Strecke:
                    <select id="route_select" onchange="loadAndRenderGraph()">
                    </select>
                </label>
<label>
    Modus:
    <select id="time_mode" onchange="updateTimeMode()">
        <option value="auto" selected>Auto-Scroll</option>
        <option value="fixed">Fixes Fenster</option>
    </select>
</label>

<label>
    Zeitbasis:
    <select id="time_basis" onchange="updateTimeMode()">
        <option value="instanz1" selected>STS Instanz 1</option>
        <option value="instanz2">STS Instanz 2</option>
        <option value="manual">Eigenes Offset / Zeit</option>
    </select>
</label>

<label id="offset_container" style="display: none;">
    STS-Offset (Min):
    <input type="number" id="sts_offset" value="180" min="-600" max="600" style="width: 60px;" onchange="applyAutoScroll()">
</label>

<div id="fixed_time_container" style="display: none; gap: 10px; align-items: center;">
    <label>
        Von:
        <input type="time" id="graph_start" value="11:45" onchange="loadAndRenderGraph()">
    </label>
    <label>
        Bis:
        <input type="time" id="graph_end" value="16:00" onchange="loadAndRenderGraph()">
    </label>
</div>

<button onclick="loadAndRenderGraph()">Aktualisieren</button>
<button type="button" id="toggle_ticker_btn" onclick="toggleTicker()" style="background: #334155;">Ticker ausblenden</button>


            </div>
            
            <div style="width: 100%; flex: 1;">
                <canvas id="graphCanvas" width="800" height="500" style="margin-top: 0; width: 100%; height: auto; display: block;"></canvas>
            </div>
            
            <!-- Hidden inputs for auto-scroll (needed by app.js) -->
            <input type="time" id="graph_start" value="11:45" style="display: none;">
            <input type="time" id="graph_end" value="16:00" style="display: none;">
        </div>
    </div>
    
    <div id="ticker_panel" style="flex: 0 0 300px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; margin-top: 44px;">
        <h2 style="color: #f1f5f9; font-size: 16px; margin: 0 0 15px 0; border-bottom: 1px solid #334155; padding-bottom: 10px;">Letzte Änderungen</h2>
        <ul id="ticker_list" style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; font-size: 13px; overflow-y: auto; flex: 1; max-height: 820px;">
        </ul>
    </div>
</div>

<div id="editor_panel" style="display: none;">
    <div id="timetable_body"></div> </div>
<form id="timetable_form" style="display: none;"></form>
<select id="route_filter" style="display: none;"></select>

<script>
var ROUTES = {};          
var routesConfig = {};    
var activeTrains = [];    
var autoScrollInterval = null;

function updateTimeMode() {
    const mode = document.getElementById('time_mode').value;
    const basis = document.getElementById('time_basis').value;
    
    const offsetContainer = document.getElementById('offset_container');
    const fixedTimeContainer = document.getElementById('fixed_time_container');
    
    // Sichtbarkeiten regeln
    if (mode === 'auto') {
        // Offset-Feld nur bei manueller Auswahl im Auto-Modus einblenden
        offsetContainer.style.display = (basis === 'manual') ? "" : "none";
        fixedTimeContainer.style.display = "none";
        
        applyAutoScroll();
        if (autoScrollInterval) clearInterval(autoScrollInterval);
        autoScrollInterval = setInterval(applyAutoScroll, 10000);
    } else {
        // Fixes Fenster
        offsetContainer.style.display = "none";
        // Zeitbalken-Eingabe nur bei manueller Auswahl erlauben
        fixedTimeContainer.style.display = (basis === 'manual') ? "flex" : "none";
        
        if (autoScrollInterval) clearInterval(autoScrollInterval);
        autoScrollInterval = null;
        
        // Wenn Instanz 1 oder 2 im fixen Modus gewählt sind, berechnen wir die feste aktuelle Zeit
        if (basis !== 'manual') {
            applyAutoScroll();
        } else {
            loadAndRenderGraph();
        }
    }
}

// Beibehalten für die Initialisierung
function updateAutoScroll() {
    updateTimeMode();
}

function applyAutoScroll() {
    const mode = document.getElementById('time_mode').value;
    const basis = document.getElementById('time_basis').value;
    const now = new Date();
    
    let calculatedOffset = 0;

    if (basis === 'manual') {
        // Eigenes Offset aus dem Input-Feld lesen
        calculatedOffset = parseInt(document.getElementById('sts_offset').value || 0, 10);
    } else {
        // Automatische Berechnung basierend auf dem Ankerpunkt (04.06.2026, 21:30 Uhr real = Instanz 1 ist 08:30 Uhr)
        const refRealTime = new Date(2026, 5, 4, 21, 30, 0); 
        const baseOffsetInstanz1 = -780; 
        
        const diffInMs = now - refRealTime;
        const diffInHours = diffInMs / (1000 * 60 * 60);
        const instancesPassed = Math.floor(diffInHours / 16);
        const totalShiftMinutes = instancesPassed * 480;
        
        // Basis-Offset für Instanz 1 berechnen
        calculatedOffset = baseOffsetInstanz1 + totalShiftMinutes;
        
        // Wenn Instanz 2 gewählt ist, liegt diese zeitlich 6 Stunden (+360 Minuten) weiter vorn
        if (basis === 'instanz2') {
            calculatedOffset += 360;
        }
        
        // Auf den Bereich -720 bis +720 Minuten normalisieren
        calculatedOffset = ((calculatedOffset + 720) % 1440 + 1440) % 1440 - 720;
        
        // Feld aktualisieren, falls man es im Hintergrund sehen möchte
        const offsetInput = document.getElementById('sts_offset');
        if (offsetInput) offsetInput.value = calculatedOffset;
    }

    // STS-Zeit berechnen
    const pcMinutes = now.getHours() * 60 + now.getMinutes();
    const stsMinutes = (pcMinutes + calculatedOffset + 1440) % 1440;
    
    // Zeitfenster bestimmen (-10 Min bis +60 Min)
    const startMinutes = (stsMinutes - 10 + 1440) % 1440;
    const endMinutes = (stsMinutes + 60 + 1440) % 1440;
    
    const startTime = `${String(Math.floor(startMinutes / 60)).padStart(2, '0')}:${String(startMinutes % 60).padStart(2, '0')}`;
    const endTime = `${String(Math.floor(endMinutes / 60)).padStart(2, '0')}:${String(endMinutes % 60).padStart(2, '0')}`;
    
    // Zeitfelder befüllen (im fixen Modus frieren sie dadurch auf dem aktuellen Berechnungsstand ein)
    if (mode === 'auto' || basis !== 'manual') {
        document.getElementById('graph_start').value = startTime;
        document.getElementById('graph_end').value = endTime;
    }
    
    if (typeof loadAndRenderGraph === 'function') {
        loadAndRenderGraph();
    }
}
</script>

<script src="app.js"></script>

<script>
async function initZuschauer() {
    const formData = new FormData();
    formData.append('action', 'get_routes');
    
    try {
        const res = await fetch('timetable.php', { method: 'POST', body: formData });
        const routesData = await res.json();
        
        ROUTES = routesData;
        routesConfig = routesData;
        
        const selector = document.getElementById('route_select');
        selector.innerHTML = '';
        
        // --- NEU: URL-Parameter auslesen ---
        const urlParams = new URLSearchParams(window.location.search);
        const paramRoute = urlParams.get('route')?.toLowerCase(); // Sucht nach ?route=...
        
        let firstId = null;
        let matchedId = null;

        for (const [id, route] of Object.entries(routesConfig)) {
            if (!firstId) firstId = id;
            
            // Prüfen, ob die ID oder der Name zum URL-Parameter passt
            if (paramRoute && (id.toLowerCase() === paramRoute || route.name.toLowerCase().includes(paramRoute))) {
                matchedId = id;
            }

            const opt = document.createElement('option');
            opt.value = id;
            opt.innerText = route.name;
            
            const searchTerms = [];
            if (route.stations && Array.isArray(route.stations)) {
                route.stations.forEach(st => {
                    searchTerms.push(st.name);
                    searchTerms.push(st.abbr);
                });
            }
            opt.setAttribute('data-search', searchTerms.join(' '));
            
            selector.appendChild(opt);
        }
        
        // Wenn ein Treffer über die URL erzielt wurde, nimm diesen, sonst die erste Route
        if (matchedId) {
            currentRouteId = matchedId;
            selector.value = matchedId;
        } else if (firstId) {
            currentRouteId = firstId; 
            selector.value = firstId;
        }
        
        if (typeof switchRoute === 'function') {
            switchRoute();
        }
        
        // Daten holen und zeichnen
        await loadAndRenderGraph();
        await loadAndRenderTicker();
        
        // Starte Auto-Scroll NACH dem ersten Render
        updateAutoScroll();
        
        // Auto-Refresh alle 30 Sekunden
        setInterval(() => {
            loadAndRenderGraph();
            loadAndRenderTicker();
        }, 30000);

    } catch (e) {
        console.error("Fehler beim Initialisieren der Zuschaueransicht:", e);
    }
}

async function loadAndRenderGraph() {
    const routeSelect = document.getElementById('route_select');
    if (!routeSelect || !routeSelect.value) return;
    
    currentRouteId = routeSelect.value; 
    
    const formData = new FormData();
    formData.append('action', 'get_all_data');
    formData.append('route_id', currentRouteId);

    try {
        const res = await fetch('timetable.php', { method: 'POST', body: formData });
        const trainsData = await res.json();
        
        activeTrains = trainsData;
        
        if (typeof renderGraph === 'function') {
            renderGraph();
        }
    } catch (e) {
        console.error("Fehler beim Laden der Fahrplandaten für Zuschauer:", e);
    }
}

async function loadAndRenderTicker() {
    const formData = new FormData();
    formData.append('action', 'get_audit_log');

    try {
        const res = await fetch('timetable.php', { method: 'POST', body: formData });
        const logs = await res.json();
        
        const list = document.getElementById('ticker_list');
        if (!list) return;
        
        list.innerHTML = '';
        
        if (!logs || logs.length === 0) {
            list.innerHTML = '<li style="color: #64748b; font-style: italic;">Noch keine Änderungen erfasst.</li>';
            return;
        }

        logs.forEach(log => {
            const li = document.createElement('li');
            li.style.padding = '8px 10px';
            li.style.background = '#0f172a';
            li.style.border = '1px solid #334155';
            li.style.borderRadius = '4px';
            li.style.lineHeight = '1.4';
            
            const logZeit = log.zeit ?? log.timestamp ?? 'Unbekannt';
            
            li.innerHTML = `
                <span style="color: #64748b; font-weight: bold; font-family: monospace;">[${logZeit}]</span> 
                Zug <strong style="color: #38bdf8;">${log.train_number}</strong> <br>
                <span style="color: #94a3b8;">Disponent:</span> <span style="color: #f1f5f9;">${log.username}</span>
            `;
            list.appendChild(li);
        });
    } catch (e) {
        console.error("Fehler beim Laden des Tickers:", e);
    }
}

function switchRouteAndLoad() {
    const routeSelect = document.getElementById('route_select');
    if (routeSelect) {
        currentRouteId = routeSelect.value;
    }
    if (typeof switchRoute === 'function') {
        switchRoute();
    }
    loadAndRenderGraph();
}

const originalFetch = window.fetch;
window.fetch = function(url, options) {
    if (url === '') url = 'timetable.php';
    return originalFetch(url, options);
};

window.onload = initZuschauer;

function filterRoutes() {
    const filterValue = document.getElementById('route_filter').value.toLowerCase();
    const select = document.getElementById('route_select');
    const options = select.options;
    
    let firstVisibleOption = null;

    for (let i = 0; i < options.length; i++) {
        const option = options[i];
        const routeName = option.text.toLowerCase();
        const stationTerms = option.getAttribute('data-search') ? option.getAttribute('data-search').toLowerCase() : '';
        
        if (routeName.includes(filterValue) || stationTerms.includes(filterValue)) {
            option.style.display = "";
            if (!firstVisibleOption) {
                firstVisibleOption = option;
            }
        } else {
            option.style.display = "none";
        }
    }

    if (firstVisibleOption && select.value !== firstVisibleOption.value) {
        select.value = firstVisibleOption.value;
        loadAndRenderGraph(); 
    }
}

function toggleTicker() {
    const ticker = document.getElementById('ticker_panel');
    const button = document.getElementById('toggle_ticker_btn');
    
    if (!ticker || !button) return;
    
    if (ticker.classList.contains('hidden')) {
        // Ticker wieder anzeigen
        ticker.classList.remove('hidden');
        button.innerText = 'Ticker ausblenden';
        button.style.background = '#334155';
    } else {
        // Ticker ausblenden
        ticker.classList.add('hidden');
        button.innerText = 'Ticker einblenden';
        button.style.background = '#10b981'; // Wechselt auf grün, wenn ausgeblendet, als visueller Hinweis
    }
    
    // Nach dem Ändern der Breite den Graph neu zeichnen, damit das Canvas die neue Breite nutzt
    if (typeof loadAndRenderGraph === 'function') {
        loadAndRenderGraph();
    }
}
</script>
</body>
</html>
